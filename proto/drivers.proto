syntax = "proto3";

package drivers;

service DriverService {
  rpc CreateDriver (CreateDriverRequest) returns (DriverResponse);
  rpc GetDriver (GetDriverRequest) returns (DriverResponse);
  rpc ListDrivers (Empty) returns (DriverListResponse);
  rpc UpdateDriverAvailability (UpdateDriverAvailabilityRequest) returns (DriverResponse);
  rpc UpdateDriverLocation (UpdateDriverLocationRequest) returns (DriverResponse);
}

message Empty {}

message CreateDriverRequest {
  string name = 1;
  string phone = 2;
  string vehicle_type = 3;
  bool available = 4;
  double latitude = 5;
  double longitude = 6;
}

message GetDriverRequest {
  int32 id = 1;
}

message UpdateDriverAvailabilityRequest {
  int32 id = 1;
  bool available = 2;
}

message UpdateDriverLocationRequest {
  int32 id = 1;
  double latitude = 2;
  double longitude = 3;
}

message DriverResponse {
  int32 id = 1;
  string name = 2;
  string phone = 3;
  string vehicle_type = 4;
  bool available = 5;
  double latitude = 6;
  double longitude = 7;
}

message DriverListResponse {
  repeated DriverResponse drivers = 1;
}